<!doctype html>
<html lang="fa" dir="rtl">
<head>
<meta charset="utf-8" />
<title>EyVay</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />

<template id="__bundler_thumbnail" data-bg-color="#1A0F14">
  <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
    <rect width="1200" height="800" fill="#1A0F14"/>
    <ellipse cx="600" cy="340" rx="520" ry="260" fill="#E8873B" opacity="0.22"/>
    <text x="600" y="430" text-anchor="middle" font-family="sans-serif" font-weight="900" font-size="220" fill="#F6EFE4">ای‌<tspan fill="#F2A85E">وای</tspan></text>
    <circle cx="560" cy="620" r="8" fill="#F6EFE4" opacity="0.3"/>
    <circle cx="600" cy="620" r="8" fill="#F2A85E"/>
    <circle cx="640" cy="620" r="8" fill="#F6EFE4" opacity="0.3"/>
  </svg>
</template>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  html, body {
    margin: 0; padding: 0;
    background: #1A0F14;
    font-family: 'Vazirmatn', sans-serif;
    overflow: hidden;
    height: 100%;
  }
  * { box-sizing: border-box; }

  @keyframes ey-fade-up {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes ey-fade-in {
    from { opacity: 0.01; } to { opacity: 1; }
  }
  @keyframes ey-slide-in {
    from { opacity: 0; transform: translateX(-20px); }
    to { opacity: 1; transform: translateX(0); }
  }
  @keyframes ey-pop {
    0%   { transform: scale(0); }
    70%  { transform: scale(1.12); }
    100% { transform: scale(1); }
  }
  @keyframes ey-pulse {
    0%, 100% { opacity: 0.3; transform: scale(1); }
    50%      { opacity: 1;   transform: scale(1.4); }
  }

  .ey-stage {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: radial-gradient(ellipse 60% 50% at 50% 40%, #2B1824 0%, #1A0F14 70%);
  }
  .ey-screen-anim {
    opacity: 1;
  }
  .ey-toast {
    position: fixed; bottom: 120px; left: 50%; transform: translateX(-50%);
    background: #1A0F14; color: #F6EFE4;
    padding: 10px 20px; border-radius: 999px;
    font-family: 'Vazirmatn'; font-size: 13px; font-weight: 600;
    z-index: 9999;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
  }
</style>

<script src="https://cdn.jsdelivr.net/npm/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

<script src="tokens.js"></script>
<script src="data.js"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="primitives.jsx"></script>
<script type="text/babel" src="store.jsx"></script>
<script type="text/babel" src="screens/shared.jsx"></script>
<script type="text/babel" src="screens/home-v2.jsx"></script>
<script type="text/babel" src="screens/detail-v2.jsx"></script>
<script type="text/babel" src="screens/search-v2.jsx"></script>
<script type="text/babel" src="screens/more-v2.jsx"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const W = 390, H = 844;

function Router() {
  const { route, toast } = useEY();
  const Screen = (() => {
    switch (route.name) {
      case 'splash':       return <SplashV2 />;
      case 'onboarding':   return <OnboardingV2 />;
      case 'home':         return <HomeV2 />;
      case 'search':       return <SearchV2 />;
      case 'saved':        return <SavedV2 />;
      case 'cart':         return <CartV2 />;
      case 'profile':      return <ProfileV2 />;
      case 'detail':       return <DetailV2 />;
      case 'checkout':     return <CheckoutV2 />;
      case 'success':      return <SuccessV2 />;
      case 'notifications':return <NotificationsV2 />;
      default:             return <HomeV2 />;
    }
  })();
  return (
    <>
      <div key={route.name + (route.params.id || '')} className="ey-screen-anim" style={{ position: 'relative', width: '100%', height: '100%' }}>
        {Screen}
      </div>
      {toast && <div className="ey-toast">{toast}</div>}
    </>
  );
}

function Stage() {
  const wrapRef = React.useRef(null);
  const [scale, setScale] = React.useState(1);
  React.useEffect(() => {
    const fit = () => {
      const vw = window.innerWidth, vh = window.innerHeight;
      const pad = 40;
      const s = Math.min((vw - pad) / W, (vh - pad) / H, 1);
      setScale(s);
    };
    fit();
    window.addEventListener('resize', fit);
    return () => window.removeEventListener('resize', fit);
  }, []);

  return (
    <div className="ey-stage">
      <div style={{ transform: `scale(${scale})`, transformOrigin: 'center center' }}>
        <IOSDevice width={W} height={H}>
          <Router />
        </IOSDevice>
      </div>
    </div>
  );
}

function App() {
  return (
    <EYProvider>
      <Stage />
    </EYProvider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
